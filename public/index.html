<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>멍멍 AI 도우미</title>
  <link rel="stylesheet" href="/css/reset.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <div class="chat-container">

    <!-- 헤더 -->
    <header class="chat-header">
      <div class="chat-header__avatar">🐶</div>
      <div class="chat-header__info">
        <span class="chat-header__name">멍멍 AI 도우미</span>
        <span class="chat-header__status">온라인</span>
      </div>
    </header>

    <!-- 메시지 영역 -->
    <main class="chat-messages" id="chatMessages">

      <!-- AI 환영 메시지 (정적) -->
      <article class="message message--ai">
        <div class="message__avatar">🐶</div>
        <div class="message__bubble">
          안녕! 나는 멍멍이야. 궁금한 거 뭐든지 물어봐줘. 멍!
        </div>
      </article>

      <!-- 유저 메시지 예시 (2단계 확인용) -->
      <article class="message message--user">
        <div class="message__bubble">안녕하세요!</div>
      </article>

      <!-- AI 답변 예시 (2단계 확인용) -->
      <article class="message message--ai">
        <div class="message__avatar">🐶</div>
        <div class="message__bubble">
          반가워! 오늘 기분은 어때? 멍멍~ 🐶
        </div>
      </article>

      <!-- 로딩 예시 (2단계 확인용) -->
      <article class="message message--ai message--loading">
        <div class="message__avatar">🐶</div>
        <div class="message__bubble">
          <div class="loading-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </article>

    </main>

    <!-- 입력 영역 -->
    <footer class="chat-input-area">
      <form class="chat-input-form" id="chatForm">
        <textarea
          class="chat-input"
          id="chatInput"
          placeholder="메시지를 입력해줘..."
          rows="1"
        ></textarea>
        <button class="chat-send-btn" type="submit" id="sendBtn" aria-label="전송">
          <!-- 종이비행기 아이콘 -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </form>
    </footer>

  </div>

  <script src="/js/app.js"></script>
</body>
</html>
